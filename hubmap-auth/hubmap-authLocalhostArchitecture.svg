    <rect
       x="130"
       y="420"
       width="390"
       height="120"
       fill="#fce4ec"
       stroke="#c2185b"
       stroke-width="2"
       rx="5"
       id="rect15" />
    <text
       x="325"
       y="445"
       text-anchor="middle"
       font-size="16"
       font-weight="bold"
       fill="#880e4f"
       id="text16">uWSGI Server</text>
    <text
       x="325"
       y="470"
       text-anchor="middle"
       font-size="14"
       id="text17">Port 5000 (internal)</text>
    <text
       x="325"
       y="495"
       text-anchor="middle"
       font-size="12"
       fill="#555"
