    <rect
       x="700"
       y="250"
       width="350"
       height="120"
       fill="#c8e6c9"
       stroke="#388e3c"
       stroke-width="1.5"
       rx="3"
       id="rect26" />
    <text
       x="875"
       y="270"
       text-anchor="middle"
       font-size="14"
       font-weight="bold"
       id="text27">Port 3333</text>
    <text
       x="875"
       y="290"
       text-anchor="middle"
       font-size="12"
       id="text28">(External API Gateway)</text>
    <text
       x="875"
       y="310"
       text-anchor="middle"
       font-size="11"
       fill="#555"
       id="text29">1. auth_request → /api_auth</text>
