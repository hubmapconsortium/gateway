       fill="#666"
       id="text4">Host:7777 → Container:7777</text>
    <!-- nginx Layer -->
    <rect
       x="130"
       y="210"
       width="390"
       height="180"
       fill="#e8f5e9"
       stroke="#388e3c"
       stroke-width="2"
