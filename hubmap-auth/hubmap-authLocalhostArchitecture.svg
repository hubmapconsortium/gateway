  <!-- hubmap-auth Container -->
  <g
     id="hubmap-auth-container">
    <rect
       x="100"
       y="120"
       width="450"
       height="650"
       fill="#fff3e0"
       stroke="#f57c00"
       stroke-width="3"
       rx="8"
