       x="325"
       y="235"
       text-anchor="middle"
       font-size="16"
       font-weight="bold"
       fill="#2e7d32"
       id="text5">nginx</text>
    <!-- Port 7777 server -->
    <rect
       x="150"
       y="250"
       width="160"
       height="120"
       fill="#c8e6c9"
       stroke="#388e3c"
       stroke-width="1.5"
       rx="3"
       id="rect5" />
    <text
       x="230"
       y="270"
       text-anchor="middle"
       font-size="14"
       font-weight="bold"
       id="text6">Port 7777</text>
    <text
