    <rect
       x="680"
       y="210"
       width="390"
       height="180"
       fill="#e8f5e9"
       stroke="#388e3c"
       stroke-width="2"
       rx="5"
       id="rect25" />
    <text
       x="875"
       y="235"
       text-anchor="middle"
       font-size="16"
       font-weight="bold"
