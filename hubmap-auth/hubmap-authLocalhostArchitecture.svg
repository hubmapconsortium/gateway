       y="350"
       text-anchor="middle"
       font-size="11"
       fill="#555"
       id="text10">→ uwsgi://127.0.0.1:5000</text>
    <!-- Port 8000 server -->
    <rect
       x="330"
       y="250"
       width="160"
       height="120"
       fill="#c8e6c9"
       stroke="#388e3c"
       stroke-width="1.5"
       rx="3"
       id="rect10" />
    <text
       x="410"
       y="270"
       text-anchor="middle"
       font-size="14"
       font-weight="bold"
       id="text11">Port 8000</text>
    <text
       x="410"
       y="290"
       text-anchor="middle"
       font-size="12"
       id="text12">(Internal Auth)</text>
    <text
       x="410"
       y="310"
       text-anchor="middle"
       font-size="11"
       fill="#555"
       id="text13">No CORS</text>
    <text
       x="410"
       y="330"
       text-anchor="middle"
       font-size="11"
       fill="#555"
       id="text14">For other APIs</text>
    <text
       x="410"
       y="350"
       text-anchor="middle"
       font-size="11"
       fill="#555"
       id="text15">→ uwsgi://127.0.0.1:5000</text>
